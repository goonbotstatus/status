<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Goonbot Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #0c0c10;
      --bg2:        #101015;
      --surface:    #18181e;
      --surface2:   #1f1f27;
      --border:     rgba(255,255,255,.06);
      --border2:    rgba(255,255,255,.10);
      --text:       #e8e8f2;
      --text2:      #9494ab;
      --text3:      #56566a;
      --accent:     #7c6ff7;
      --accent-glow:rgba(124,111,247,.22);
      --green:      #3dd68c;
      --green-dim:  rgba(61,214,140,.10);
      --red:        #f06c6c;
      --red-dim:    rgba(240,108,108,.10);
      --amber:      #f5a623;
      --amber-dim:  rgba(245,166,35,.10);
      --r-sm:       9px;
      --r:          13px;
      --r-lg:       18px;
      --font:       'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* ── Page shell ───────────────────────────────── */
    .page {
      width: 100%;
      max-width: 680px;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── Header ───────────────────────────────────── */
    header { display: flex; flex-direction: column; gap: 4px; }
    .logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .logo-sub {
      font-size: .78rem;
      color: var(--text3);
      font-weight: 400;
      letter-spacing: .01em;
    }

    /* ── Overall banner ───────────────────────────── */
    .banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: var(--r-lg);
      border: 1px solid;
      transition: background .3s, border-color .3s;
    }
    .banner.ok {
      background: var(--green-dim);
      border-color: color-mix(in oklab, var(--green) 30%, transparent);
    }
    .banner.degraded {
      background: var(--red-dim);
      border-color: color-mix(in oklab, var(--red) 30%, transparent);
    }
    .banner.loading {
      background: var(--surface);
      border-color: var(--border2);
    }
    .banner-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .banner.ok    .banner-dot { background: var(--green); box-shadow: 0 0 0 3px color-mix(in oklab, var(--green) 25%, transparent); }
    .banner.degraded .banner-dot { background: var(--red);   box-shadow: 0 0 0 3px color-mix(in oklab, var(--red)   25%, transparent); }
    .banner.loading .banner-dot { background: var(--text3); }
    .banner-text { display: flex; flex-direction: column; gap: 2px; }
    .banner-title {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
    }
    .banner-sub {
      font-size: .75rem;
      color: var(--text2);
      line-height: 1.5;
    }

    /* ── Service grid ─────────────────────────────── */
    .section-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: -16px;
    }
    .services {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) { .services { grid-template-columns: 1fr; } }

    .svc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .25s;
    }
    .svc:hover { border-color: var(--border2); }

    .svc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .svc-name {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
    }
    .svc-icon {
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .svc-icon svg { width: 14px; height: 14px; color: var(--text2); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge.ok       { background: var(--green-dim); color: var(--green); }
    .badge.ok::before { background: var(--green); }
    .badge.offline  { background: var(--red-dim);   color: var(--red);   }
    .badge.offline::before { background: var(--red); }
    .badge.degraded { background: var(--amber-dim); color: var(--amber); }
    .badge.degraded::before { background: var(--amber); }
    .badge.loading  { background: var(--surface2); color: var(--text3); }
    .badge.loading::before { background: var(--text3); }

    .svc-detail {
      font-size: .72rem;
      color: var(--text3);
      line-height: 1.5;
    }

    /* ── Footer ───────────────────────────────────── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .footer-meta {
      font-size: .72rem;
      color: var(--text3);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      color: var(--text2);
      font-family: var(--font);
      font-size: .72rem;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--text); }
    .refresh-btn svg { width: 11px; height: 11px; }
    .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Goon<span>bot</span></div>
    <div class="logo-sub">System Status</div>
  </header>

  <!-- Overall banner -->
  <div class="banner loading" id="banner">
    <div class="banner-dot"></div>
    <div class="banner-text">
      <div class="banner-title" id="banner-title">Checking…</div>
      <div class="banner-sub"  id="banner-sub"></div>
    </div>
  </div>

  <!-- Services -->
  <div class="section-label">Services</div>
  <div class="services" id="services">

    <div class="svc" id="svc-web">
      <div class="svc-header">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <span class="badge loading" id="badge-web">Checking</span>
      </div>
      <div class="svc-name">Website</div>
      <div class="svc-detail" id="detail-web">—</div>
    </div>

    <div class="svc" id="svc-ai">
      <div class="svc-header">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
          </svg>
        </div>
        <span class="badge loading" id="badge-ai">Checking</span>
      </div>
      <div class="svc-name">AI Inference</div>
      <div class="svc-detail" id="detail-ai">—</div>
    </div>

    <div class="svc" id="svc-image_gen">
      <div class="svc-header">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span class="badge loading" id="badge-image_gen">Checking</span>
      </div>
      <div class="svc-name">Image Generation</div>
      <div class="svc-detail" id="detail-image_gen">—</div>
    </div>

    <div class="svc" id="svc-discord">
      <div class="svc-header">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.909 19.909 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
        </div>
        <span class="badge loading" id="badge-discord">Checking</span>
      </div>
      <div class="svc-name">Discord Bot</div>
      <div class="svc-detail" id="detail-discord">—</div>
    </div>

  </div><!-- /services -->

  <footer>
    <div class="footer-meta">
      <span id="last-checked">Checking now…</span>
      <span><a href="https://goonbot.net" target="_blank">goonbot.net</a></span>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="check()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="refresh-icon">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      Refresh
    </button>
  </footer>

</div><!-- /page -->

<script>
  const HEALTH_URL = 'https://goonbot.net/health';
  const REFRESH_MS = 60000;

  let _nextRefresh = null;
  let _checking    = false;

  function setBadge(id, status) {
    const el = document.getElementById('badge-' + id);
    if (!el) return;
    const labels = { ok: 'Operational', offline: 'Offline', degraded: 'Degraded', unknown: 'Unknown', loading: 'Checking' };
    el.className = 'badge ' + (status || 'loading');
    el.textContent = labels[status] || 'Checking';
  }

  function setDetail(id, text) {
    const el = document.getElementById('detail-' + id);
    if (el) el.textContent = text || '—';
  }

  function setBanner(state, title, sub) {
    const el = document.getElementById('banner');
    el.className = 'banner ' + state;
    document.getElementById('banner-title').textContent = title;
    document.getElementById('banner-sub').textContent   = sub || '';
  }

  function setLastChecked(ts) {
    const el = document.getElementById('last-checked');
    if (!ts) { el.textContent = 'Never checked'; return; }
    const ago = Math.round((Date.now() / 1000) - ts);
    el.textContent = ago < 5
      ? 'Just checked'
      : `Last checked ${ago < 60 ? ago + 's' : Math.round(ago/60) + 'm'} ago`;
  }

  async function check() {
    if (_checking) return;
    _checking = true;

    const btn  = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    btn.disabled = true;
    icon.style.animation = 'spin .7s linear infinite';

    // Reset to loading state
    ['web','ai','image_gen','discord'].forEach(id => {
      setBadge(id, 'loading');
      setDetail(id, '—');
    });
    setBanner('loading', 'Checking…', '');

    let data = null;
    try {
      const controller = new AbortController();
      const timeout    = setTimeout(() => controller.abort(), 8000);
      const t0         = Date.now();
      const resp       = await fetch(HEALTH_URL, { signal: controller.signal, cache: 'no-store' });
      clearTimeout(timeout);
      const ms         = Date.now() - t0;
      data             = await resp.json();
      data._fetch_ms   = ms;
    } catch (e) {
      // Server unreachable — power out, network down, etc.
    }

    if (!data) {
      setBanner('degraded', 'All services unreachable', "I'm aware of this and working to get things back up.");
      ['web','ai','image_gen','discord'].forEach(id => {
        setBadge(id, 'offline');
        setDetail(id, 'Could not reach server');
      });
      document.getElementById('last-checked').textContent = 'Check failed · retrying in 60s';
    } else {
      const svcs  = data.services || {};
      const allOk = data.status === 'ok';

      // Overall banner
      if (allOk) {
        setBanner('ok', 'All systems operational', `Response time ${data._fetch_ms}ms`);
      } else {
        const down = Object.entries(svcs)
          .filter(([,v]) => v.status !== 'ok')
          .map(([,v]) => v.label || '')
          .filter(Boolean)
          .join(', ');
        setBanner('degraded', 'Service disruption detected',
          (down ? down + (down.endsWith('.') ? '' : '.') + ' ' : '') +
          "I'm on it.");
      }

      // Per-service badges + details
      const detailText = {
        web:       s => s === 'ok' ? `${data._fetch_ms}ms response time` : 'Not responding',
        ai:        s => s === 'ok' ? 'Models loaded'     : 'Inference unavailable',
        image_gen: s => s === 'ok' ? 'Queue accepting jobs' : 'Not responding',
        discord:   s => s === 'ok' ? 'Bot online'        : s === 'unknown' ? 'Status unknown' : 'Bot offline',
      };

      for (const [id, svc] of Object.entries(svcs)) {
        setBadge(id, svc.status);
        setDetail(id, (detailText[id] || (() => ''))(svc.status));
      }

      setLastChecked(data.ts);
    }

    icon.style.animation = '';
    btn.disabled = false;
    _checking = false;

    // Schedule next auto-refresh
    clearTimeout(_nextRefresh);
    _nextRefresh = setTimeout(check, REFRESH_MS);

    // Live "X seconds ago" ticker
    tickLastChecked();
  }

  let _lastTs = null;
  function tickLastChecked() {
    clearInterval(window._tickInterval);
    window._tickInterval = setInterval(() => {
      if (_lastTs) setLastChecked(_lastTs);
    }, 10000);
  }

  // Patch setLastChecked to also store the ts for the ticker
  const _origSetLastChecked = setLastChecked;
  window.setLastChecked = function(ts) {
    _lastTs = ts;
    _origSetLastChecked(ts);
  };

  // Kick off immediately
  check();
</script>
</body>
</html>
